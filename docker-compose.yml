version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: supplier-db
    environment:
      POSTGRES_USER: supplier
      POSTGRES_PASSWORD: supplier123
      POSTGRES_DB: supplier_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supplier -d supplier_hub"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: supplier-web
    ports:
      - "9000:9000"   # HTI Portal
    environment:
      DATABASE_URL: postgresql://supplier:supplier123@db:5432/supplier_hub
      PIPELINE_DATABASE_URL: postgresql://supplier:supplier123@db:5432/hti_pipeline
      JWT_SECRET: change-this-secret-in-production
      JWT_EXPIRY: "3600"
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen3.5:4b
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
