services:
  db:
    image: postgres:15-alpine
    container_name: supplier-db
    environment:
      POSTGRES_USER: supplier
      POSTGRES_PASSWORD: supplier123
      POSTGRES_DB: supplier_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supplier -d supplier_hub"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  web:
    build: .
    container_name: supplier-web
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://supplier:supplier123@db:5432/supplier_hub
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
