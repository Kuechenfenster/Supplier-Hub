<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supplier Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header img {
            display: block;
            margin: 0 auto 15px;
            max-height: 80px;
            max-width: 200px;
            height: auto;
            background: white;
            padding: 8px 15px;
            border-radius: 8px;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="assets/logo.png" alt="HTI Logo">
            <h1>Supplier Portal</h1>
            <p>Register your factory account</p>
        </div>
        <div class="content">
            <div class="alert" id="registerAlert"></div>
            <form id="registerForm">
                <div class="form-group">
                    <label>Factory / Company Name *</label>
                    <input type="text" id="factoryName" placeholder="Enter factory name" required>
                </div>
                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" id="factoryEmail" placeholder="factory@company.com" required>
                </div>
                <div class="form-group">
                    <label>Supplier Code *</label>
                    <input type="text" id="factoryCode" placeholder="e.g., SUP-001" required>
                </div>
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" id="factoryPassword" placeholder="Create password" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password *</label>
                    <input type="password" id="factoryConfirmPassword" placeholder="Confirm password" required>
                </div>
                <button type="submit" class="btn">Register Factory</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('factoryName').value;
            const email = document.getElementById('factoryEmail').value;
            const code = document.getElementById('factoryCode').value;
            const password = document.getElementById('factoryPassword').value;
            const confirmPassword = document.getElementById('factoryConfirmPassword').value;
            const alert = document.getElementById('registerAlert');

            if (password !== confirmPassword) {
                alert.textContent = 'Passwords do not match!';
                alert.className = 'alert error';
                alert.style.display = 'block';
                return;
            }

            let suppliers = JSON.parse(localStorage.getItem('suppliers')) || [];
            if (suppliers.find(s => s.code === code)) {
                alert.textContent = 'Supplier code already exists!';
                alert.className = 'alert error';
                alert.style.display = 'block';
                return;
            }

            suppliers.push({ name, email, code, password, materials: [] });
            localStorage.setItem('suppliers', JSON.stringify(suppliers));

            alert.textContent = 'Registration successful!';
            alert.className = 'alert success';
            alert.style.display = 'block';
            setTimeout(() => document.getElementById('registerForm').reset(), 1500);
        });
    </script>
</body>
</html>
