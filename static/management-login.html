<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Portal - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { max-width: 400px; width: 100%; background: white; border-radius: 15px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 40px; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo img { max-height: 60px; }
        .logo h1 { color: #1a1a2e; font-size: 24px; margin-top: 15px; }
        .logo p { color: #666; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; font-size: 14px; }
        .form-group input { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 15px; }
        .form-group input:focus { outline: none; border-color: #1a1a2e; }
        .btn { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(26,26,46,0.4); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .alert { padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
        .alert.error { background: #f8d7da; color: #721c24; }
        .alert.success { background: #d4edda; color: #155724; }
        .links { text-align: center; margin-top: 20px; color: #666; font-size: 14px; }
        .links a { color: #1a1a2e; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="/assets/logo.png" alt="HTI Logo">
            <h1>Management Portal</h1>
            <p>Sign in to your admin account</p>
        </div>
        <div class="alert" id="loginAlert"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn" id="loginBtn">Sign In</button>
        </form>
        <div class="links">
            <a href="/">← Back to Supplier Portal</a>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const alert = document.getElementById('loginAlert');
            
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    alert.textContent = 'Login successful! Redirecting...';
                    alert.className = 'alert success';
                    alert.style.display = 'block';
                    setTimeout(() => window.location.href = '/management', 1000);
                } else {
                    alert.textContent = data.detail || 'Login failed!';
                    alert.className = 'alert error';
                    alert.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                }
            } catch (error) {
                alert.textContent = 'Connection error: ' + error.message;
                alert.className = 'alert error';
                alert.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
        
        // Check if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = '/management';
        }
    </script>
</body>
</html>
